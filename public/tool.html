<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .calculator {
            background: #2d3748;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            padding: 20px;
            width: 240px;
        }

        .display {
            background: #1a202c;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: right;
            border: 2px solid #4a5568;
        }

        .display-value {
            color: #fff;
            font-size: 2rem;
            font-weight: 300;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            word-break: break-all;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
        }

        .btn-number {
            background: #4a5568;
        }

        .btn-number:hover {
            background: #5a6578;
            transform: translateY(-2px);
        }

        .btn-operator {
            background: #e53e3e;
        }

        .btn-operator:hover {
            background: #f56565;
            transform: translateY(-2px);
        }

        .btn-clear {
            background: #38a169;
            grid-column: span 2;
        }

        .btn-clear:hover {
            background: #48bb78;
            transform: translateY(-2px);
        }

        .btn-equals {
            background: #3182ce;
            grid-column: span 2;
        }

        .btn-equals:hover {
            background: #4299e1;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
<meta name="description" content="calculator">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="display-value" id="display">0</div>
        </div>
        <div class="buttons">
            <button class="btn-clear" data-event-click="clearDisplay()">Clear</button>
            <button class="btn-operator" data-event-click="appendToDisplay("/')">/</button>
            <button class="btn-operator" data-event-click="appendToDisplay("*')">×</button>
            
            <button class="btn-number" data-event-click="appendToDisplay("7')">7</button>
            <button class="btn-number" data-event-click="appendToDisplay("8')">8</button>
            <button class="btn-number" data-event-click="appendToDisplay("9')">9</button>
            <button class="btn-operator" data-event-click="appendToDisplay("-')">-</button>
            
            <button class="btn-number" data-event-click="appendToDisplay("4')">4</button>
            <button class="btn-number" data-event-click="appendToDisplay("5')">5</button>
            <button class="btn-number" data-event-click="appendToDisplay("6')">6</button>
            <button class="btn-operator" data-event-click="appendToDisplay("+')">+</button>
            
            <button class="btn-number" data-event-click="appendToDisplay("1')">1</button>
            <button class="btn-number" data-event-click="appendToDisplay("2')">2</button>
            <button class="btn-number" data-event-click="appendToDisplay("3')">3</button>
            <button class="btn-number" data-event-click="appendToDisplay("0')" style="grid-row: span 2;">0</button>
            
            <button class="btn-number" data-event-click="appendToDisplay(".')">.</button>
            <button class="btn-equals" data-event-click="calculate()">=</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let currentInput = '0';
        let shouldResetDisplay = false;

        function updateDisplay() {
            display.textContent = currentInput;
        }

        function appendToDisplay(value) {
            if (shouldResetDisplay) {
                currentInput = '';
                shouldResetDisplay = false;
            }
            
            if (currentInput === '0' && value !== '.') {
                currentInput = value;
            } else {
                currentInput += value;
            }
            
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '0';
            shouldResetDisplay = false;
            updateDisplay();
        }

        function calculate() {
            try {
                let expression = currentInput.replace(/×/g, '*');
                let result = eval(expression);
                
                if (!isFinite(result)) {
                    currentInput = 'Error';
                } else {
                    currentInput = result.toString();
                }
                
                shouldResetDisplay = true;
                updateDisplay();
            } catch (error) {
                currentInput = 'Error';
                shouldResetDisplay = true;
                updateDisplay();
            }
        }

        // Keyboard support
        document.addEventListener('keydown', function(event) {
            const key = event.key;
            
            if (key >= '0' && key <= '9' || key === '.') {
                appendToDisplay(key);
            } else if (key === '+' || key === '-' || key === '/') {
                appendToDisplay(key);
            } else if (key === '*') {
                appendToDisplay('*');
            } else if (key === 'Enter' || key === '=') {
                calculate();
            } else if (key === 'Escape' || key === 'c' || key === 'C') {
                clearDisplay();
            }
        });
    </script>
</body>
</html>
